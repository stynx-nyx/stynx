<mat-card class="user-list">
  <form class="user-list__filters" [formGroup]="filterForm" (ngSubmit)="applyFilter()">
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" placeholder="user@example.com" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Phone</mat-label>
      <input matInput formControlName="phone" placeholder="+1 555 555 5555" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Group</mat-label>
      <input matInput formControlName="group" placeholder="admins" />
    </mat-form-field>
    <div class="user-list__filters-actions">
      <button mat-flat-button color="primary" type="submit">Apply</button>
      <button mat-stroked-button type="button" (click)="clearFilters()">Clear</button>
    </div>
  </form>

  @if (loading) {
    <div class="user-list__loading">
      <mat-spinner diameter="32"></mat-spinner>
    </div>
  } @else {
    <div class="user-list__table">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
        <ng-container matColumnDef="displayName">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let user">{{ user.displayName || user.email || 'Unnamed user' }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let user">{{ user.email || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let user">
            <span class="user-list__status" [class.user-list__status--inactive]="user.status !== 'active'">
              {{ user.status }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let user">
            <button mat-button color="primary" (click)="openDetail(user)">
              <mat-icon>manage_accounts</mat-icon>
              Details
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns" class="user-list__row"></tr>
      </table>
      <mat-paginator [pageSize]="20" [pageSizeOptions]="[10, 20, 50]"></mat-paginator>
    </div>
  }
</mat-card>
