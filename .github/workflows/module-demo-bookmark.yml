# Generated from BP-DEMO-BOOKMARK-001 v0.1.0 sha256:a5553692
name: module-demo-bookmark

on:
  workflow_dispatch:
  push:
    paths:
      - 'domain/demo-bookmark/**'
  pull_request:
    paths:
      - 'domain/demo-bookmark/**'

permissions:
  contents: read

concurrency:
  group: module-demo-bookmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stynx
          POSTGRES_USER: stynx
          POSTGRES_PASSWORD: stynx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stynx -d stynx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      STYNX_TEST_PG_HOST: 127.0.0.1
      STYNX_TEST_PG_PORT: '5432'
      STYNX_TEST_PG_USER: stynx
      STYNX_TEST_PG_PASSWORD: stynx
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-stynx
        with:
          node-version: '24'
          node-auth-token: ${{ secrets.DEVAI_REPO_TOKEN || github.token }}
      - run: pnpm --filter ./domain/demo-bookmark/api run build
      - run: pnpm --filter ./domain/demo-bookmark/api run test
      - run: pnpm --filter ./domain/demo-bookmark/api run lint
      - run: pnpm --filter ./domain/demo-bookmark/web run build
      - run: pnpm --filter ./domain/demo-bookmark/web run test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-stynx
        with:
          install: 'false'
      - run: |
          if command -v npm >/dev/null 2>&1; then
            npm audit --audit-level=high --workspaces || true
          fi

  workspace-typecheck:
    # Demonstrates the reusable-typecheck workflow pattern; runs alongside
    # build to catch regressions caused by demo-bookmark changes that
    # propagate to other packages via @stynx-nyx/* imports.
    uses: ./.github/workflows/reusable-typecheck.yml
    secrets:
      devai-repo-token: ${{ secrets.DEVAI_REPO_TOKEN }}
    with:
      node-version: '24'
