# Generated from BP-DEMO-BOOKMARK-001 v0.1.0 sha256:a5553692
name: module-demo-bookmark

on:
  push:
    paths:
      - 'domain/demo-bookmark/**'
  pull_request:
    paths:
      - 'domain/demo-bookmark/**'

permissions:
  contents: read

concurrency:
  group: module-demo-bookmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./domain/demo-bookmark/api run build
      - run: pnpm --filter ./domain/demo-bookmark/api run test
      - run: pnpm --filter ./domain/demo-bookmark/api run lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: |
          if command -v npm >/dev/null 2>&1; then
            npm audit --audit-level=high --workspaces || true
          fi
