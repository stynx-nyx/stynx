# Generated from BP-DEMO-BOOKMARK-001 v0.1.0 sha256:a5553692
name: module-demo-bookmark

on:
  workflow_dispatch:
  push:
    paths:
      - 'domain/demo-bookmark/**'
  pull_request:
    paths:
      - 'domain/demo-bookmark/**'

permissions:
  contents: read

concurrency:
  group: module-demo-bookmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-stynx
        with:
          node-version: '24'
      - run: pnpm --filter ./domain/demo-bookmark/api run build
      - run: pnpm --filter ./domain/demo-bookmark/api run test
      - run: pnpm --filter ./domain/demo-bookmark/api run lint
      - run: pnpm --filter ./domain/demo-bookmark/web run build
      - run: pnpm --filter ./domain/demo-bookmark/web run test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-stynx
        with:
          install: 'false'
      - run: |
          if command -v npm >/dev/null 2>&1; then
            npm audit --audit-level=high --workspaces || true
          fi

  workspace-typecheck:
    # Demonstrates the reusable-typecheck workflow pattern; runs alongside
    # build to catch regressions caused by demo-bookmark changes that
    # propagate to other packages via @stynx/* imports.
    uses: ./.github/workflows/reusable-typecheck.yml
    with:
      node-version: '24'
