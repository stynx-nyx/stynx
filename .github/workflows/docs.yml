name: Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.ci/evidence/**'
      - 'packages/**'
      - 'packages-web/**'
      - 'scripts/evidence/**'
      - '.github/workflows/docs.yml'
      - '.github/workflows/evidence.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.ci/evidence/**'
      - 'packages/**'
      - 'packages-web/**'
      - 'scripts/evidence/**'
      - '.github/workflows/docs.yml'
      - '.github/workflows/evidence.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'

jobs:
  evidence-gate:
    name: evidence-gate
    runs-on: ubuntu-latest
    outputs:
      evidence_mode: ${{ steps.verify.outputs.evidence_mode }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check local CI evidence mode
        id: verify
        run: node scripts/evidence/verify-local-evidence.mjs --mode gate --github-output "$GITHUB_OUTPUT"
        env:
          LOCAL_EVIDENCE_TRUSTED_ACTORS: ${{ vars.LOCAL_EVIDENCE_TRUSTED_ACTORS }}

  build:
    name: build-docs
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: pnpm --filter docs build:ci

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docs-lighthouse
          path: docs/build/lighthouse
          if-no-files-found: ignore

      - name: Upload pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/build

  deploy:
    name: deploy-pages
    # Disabled by default until repository Pages deployment is explicitly enabled.
    if: ${{ vars.ENABLE_PAGES_DEPLOY == 'true' && needs.evidence-gate.outputs.evidence_mode != 'true' }}
    needs:
      - evidence-gate
      - build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
