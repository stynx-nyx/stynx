name: Docs freshness check

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.ci/evidence/**'
      - 'packages/**'
      - 'packages-web/**'
      - '.github/workflows/docs.yml'
      - '.github/workflows/evidence.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.ci/evidence/**'
      - 'packages/**'
      - 'packages-web/**'
      - '.github/workflows/docs.yml'
      - '.github/workflows/evidence.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'
  # @devai-nyx/* resolves from GitHub Packages (npm.pkg.github.com), which
  # needs an authenticated read regardless of the source repo's visibility.
  NODE_AUTH_TOKEN: ${{ secrets.DEVAI_REPO_TOKEN || github.token }}

jobs:
  # Single-source evidence gate (ADR-CI-ECONOMY Decision 7).
  evidence-gate:
    uses: devai-nyx/devai/.github/workflows/reusable-evidence-gate.yml@main

  build:
    name: build-docs
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@086160e580d6e8c142ad5ba29009dcde677c6321 # v2

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: pnpm --filter @stynx-nyx/docs-site build:ci

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-lighthouse
          path: docs/site/build/lighthouse
          if-no-files-found: ignore
