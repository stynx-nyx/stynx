name: Docs freshness check

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.ci/evidence/**'
      - 'packages/**'
      - 'packages-web/**'
      - 'scripts/evidence/**'
      - '.github/workflows/docs.yml'
      - '.github/workflows/evidence.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.ci/evidence/**'
      - 'packages/**'
      - 'packages-web/**'
      - 'scripts/evidence/**'
      - '.github/workflows/docs.yml'
      - '.github/workflows/evidence.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'

jobs:
  evidence-gate:
    name: evidence-gate
    runs-on: ubuntu-latest
    outputs:
      evidence_mode: ${{ steps.verify.outputs.evidence_mode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check local CI evidence mode
        id: verify
        run: node scripts/evidence/verify-local-evidence.mjs --mode gate --github-output "$GITHUB_OUTPUT"
        env:
          LOCAL_EVIDENCE_TRUSTED_ACTORS: ${{ vars.LOCAL_EVIDENCE_TRUSTED_ACTORS }}

  build:
    name: build-docs
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: pnpm --filter @stynx-nyx/docs-site build:ci

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-lighthouse
          path: docs/site/build/lighthouse
          if-no-files-found: ignore
