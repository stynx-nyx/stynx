name: STYNX Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  # No NPM_CONFIG_PROVENANCE: npm provenance requires public access and
  # GitHub Packages publishes are always restricted — with it set, every
  # `npm publish` fails with EUSAGE and nothing reaches the registry
  # (runs 29102848562, 29109128724). Same rationale as
  # scripts/changesets-publish-ci.mjs, which this workflow-level env was
  # silently overriding via process.env passthrough.
  PNPM_VERSION: '9.15.0'
  STYNX_ENABLE_REGISTRY_PUBLISH: ${{ vars.STYNX_ENABLE_REGISTRY_PUBLISH || 'false' }}
  # @devai-nyx/* resolves from GitHub Packages (npm.pkg.github.com), which
  # needs an authenticated read regardless of the source repo's visibility.
  # Step-level env (below, the Changesets publish step) overrides this for
  # its own NPM_TOKEN-based publish semantics -- unaffected by this default.
  NODE_AUTH_TOKEN: ${{ secrets.DEVAI_REPO_TOKEN || github.token }}

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'Local-CI-Evidence:') }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable STYNX workspace packages
        run: pnpm build

      - name: Run Changesets release flow
        uses: changesets/action@d94a5c301145045a0960133674e003b265942a22 # v1.8.0
        with:
          version: pnpm version-packages
          publish: pnpm release:publish:ci
          commit: 'ci: version packages'
          title: 'ci: version packages'
          createGithubReleases: true
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT-created packages carry no per-package Actions write grant, so
          # the ambient GITHUB_TOKEN 403s on publish (write_package) despite
          # repository linkage. NPM_TOKEN keeps waves autonomous; once the
          # owner grants 'Manage Actions access' per package in the UI, delete
          # the secret and the ambient-token fallback takes over.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
