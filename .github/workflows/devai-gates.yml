# DEVAI gates for stynx (Phase E of C-4 adoption pilot).
# Runs the seven L0 inventory sensors + spec validation on every PR
# to surface inventory drift, unbound endpoints, unmapped routes, and
# invariant violations BEFORE merge.
#
# devai is consumed as a published @devai-nyx/cli package from GitHub
# Packages (npm-package consumption model, D-118) -- no sibling ../devai
# checkout. @devai-nyx:registry is scoped in .npmrc; NODE_AUTH_TOKEN needs
# read:packages on the devai-nyx org (the ambient GITHUB_TOKEN cannot read
# another org's packages, same reasoning as devai's own reusable-evidence-
# gate.yml). The redox-pack-nestjs-postgres-angular stack-adapter pack
# stynx resolves to isn't published in the package (examples/ is dev-only
# in devai's own repo) -- a copy is vendored at .devai/vendor/devai-packs/.

name: devai-gates

on:
  pull_request:
    branches: [main]
    paths:
      - '.devai/**'
      - 'docs/framework/arch/**'
      - 'docs/framework/product/**'
      - 'reference/**'
      - 'packages/**'
      - 'packages-web/**'
      - 'domain/**'
      - '.github/workflows/devai-gates.yml'
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: devai-gates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate-status:
    name: DEVAI gate status
    runs-on: ubuntu-latest
    steps:
      - name: Report DEVAI gate mode
        run: |
          if [ "${{ vars.DEVAI_GATES_ENABLED }}" = "true" ]; then
            echo "::notice::devai-gates enabled"
          else
            echo "::notice::devai-gates skipped: DEVAI_GATES_ENABLED unset"
          fi

  devai-inventory:
    name: DEVAI inventory + invariant gates
    if: ${{ vars.DEVAI_GATES_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout stynx
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 9.15.0

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies (resolves @devai-nyx/cli from GitHub Packages)
        run: |
          pnpm install --frozen-lockfile
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.DEVAI_REPO_TOKEN || github.token }}
          # DEVAI_REPO_TOKEN previously only needed contents:read (git clone
          # of the sibling devai checkout); it now also needs read:packages
          # on the devai-nyx org to pull @devai-nyx/cli from GitHub Packages.
          # Verify/update the token's scope if this step 401s.

      - name: Verify pack matches stynx
        run: devai pack-resolve --repo-root .devai/vendor/devai-packs --adopter-root . --human

      - name: devai doctor --adopter (post-Phase-21.B; expects 6/6 PASS)
        run: devai doctor --adopter --human

      - name: devai check glob-guards (devai D-124; catches a renamed/retired path before it goes silently dead)
        run: devai check glob-guards --repo-root . --human

      - name: Run the seven L0 inventory sensors
        run: |
          set -euo pipefail
          devai sense-api          --repo-root . --adopter-root . --packs-root .devai/vendor/devai-packs --pack-tune --human
          devai sense-routes       --repo-root . --adopter-root . --packs-root .devai/vendor/devai-packs --pack-tune --human
          devai sense-data-model   --repo-root . --adopter-root . --packs-root .devai/vendor/devai-packs --pack-tune --human
          devai sense-data-handling --repo-root . --human
          devai sense-rbac         --repo-root . --human
          devai sense-dep-graph    --repo-root . --human
          devai sense-coverage     --repo-root . --routes-path .devai/state/sensors/inventory_routes/routes-angular.json --human

      - name: Validate stynx invariants against the schema
        run: |
          set -euo pipefail
          validated=0
          for f in docs/framework/arch/invariants/*.json; do
            [ -f "$f" ] || continue
            echo "::group::validate $f"
            node -e "
              const { validators } = require('@devai-nyx/schemas');
              const inv = require(require('path').resolve('$f'));
              if (!validators.invariant(inv)) {
                console.error(JSON.stringify(validators.invariant.errors, null, 2));
                process.exit(1);
              }
              console.log('PASS', inv.id);
            "
            echo "::endgroup::"
            validated=$((validated + 1))
          done
          # A dead glob here (rename, restructure) would otherwise make this
          # whole step a silent no-op that still reports green — see D-124 in
          # devai and this workflow's own history. Fail loudly instead.
          if [ "$validated" -eq 0 ]; then
            echo "::error::no invariant files matched docs/framework/arch/invariants/*.json — this step validated nothing"
            exit 1
          fi
          echo "validated $validated invariant file(s)"

      - name: Refresh invariant candidates (informational)
        run: pnpm exec devai inv-suggest --from-inventory --repo-root . --human

      - name: Validate any module-blueprints in draft
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in docs/framework/product/draft/blueprints/*.json; do
            echo "::group::validate $f"
            devai blueprint-validate --file "$f" --human
            echo "::endgroup::"
          done

      - name: Upload sensor + candidate evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: devai-evidence-${{ github.run_id }}
          path: |
            .devai/state/sensors/**
            .devai/state/sensor-readings/**
            .devai/state/inv-candidates/**
            .devai/state/scorecards/**
            .devai/state/llm-usage.jsonl
            .devai/state/agent-runs/**
            .devai/state/skills/**
          if-no-files-found: ignore
          retention-days: 14
