# DEVAI gates for stynx (Phase E of C-4 adoption pilot).
# Runs the seven L0 inventory sensors + spec validation on every PR
# to surface inventory drift, unbound endpoints, unmapped routes, and
# invariant violations BEFORE merge.
#
# Adopters of DEVAI can copy this file as a starting point. The
# `cwd = stynx` assumption + `../devai` sibling layout match the
# C-4 pilot brief; CI environments without that layout should
# instead `pnpm link --global @devai/cli` from a published artifact
# and replace the `cd ../devai && pnpm install` block.

name: devai-gates

on:
  pull_request:
    branches: [main]
    paths:
      - '.devai/**'
      - 'docs/framework/arch/**'
      - 'docs/framework/product/**'
      - 'reference/**'
      - 'packages/**'
      - 'packages-web/**'
      - 'domain/**'
      - '.github/workflows/devai-gates.yml'
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: devai-gates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate-status:
    name: DEVAI gate status
    runs-on: ubuntu-latest
    steps:
      - name: Report DEVAI gate mode
        run: |
          if [ "${{ vars.DEVAI_GATES_ENABLED }}" = "true" ]; then
            echo "::notice::devai-gates enabled: sibling DEVAI checkout will run"
          else
            echo "::notice::devai-gates skipped: DEVAI_GATES_ENABLED unset -- sibling devai repo not reachable from Actions"
          fi

  devai-inventory:
    name: DEVAI inventory + invariant gates
    if: ${{ vars.DEVAI_GATES_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout stynx
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: stynx

      - name: Checkout devai (sibling)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ vars.DEVAI_REPO || 'aarusso-nyx/devai' }}
          ref: ${{ vars.DEVAI_REF  || 'main' }}
          path: devai
          token: ${{ secrets.DEVAI_REPO_TOKEN || github.token }}
          # Falls back to a fresh clone of devai's main branch unless
          # DEVAI_REPO / DEVAI_REF repository variables override it. Private
          # DEVAI repositories require DEVAI_REPO_TOKEN with read access.

      - name: Set up pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 9.15.0

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: |
            stynx/pnpm-lock.yaml
            devai/pnpm-lock.yaml

      - name: Build + link devai CLI
        working-directory: devai
        run: |
          pnpm install --frozen-lockfile
          pnpm -w build
          mkdir -p "$HOME/.local/bin"
          cd packages/cli
          PNPM_HOME="$HOME/.local/bin" pnpm link --global
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify pack matches stynx
        working-directory: stynx
        run: devai pack-resolve --repo-root ../devai --adopter-root . --human

      - name: devai doctor --adopter (post-Phase-21.B; expects 6/6 PASS)
        working-directory: stynx
        run: devai doctor --adopter --human

      - name: devai check glob-guards (devai D-124; catches a renamed/retired path before it goes silently dead)
        working-directory: stynx
        run: devai check glob-guards --repo-root . --human

      - name: Run the seven L0 inventory sensors
        working-directory: stynx
        run: |
          set -euo pipefail
          devai sense-api          --repo-root . --adopter-root . --packs-root ../devai --pack-tune --human
          devai sense-routes       --repo-root . --adopter-root . --packs-root ../devai --pack-tune --human
          devai sense-data-model   --repo-root . --adopter-root . --packs-root ../devai --pack-tune --human
          devai sense-data-handling --repo-root . --human
          devai sense-rbac         --repo-root . --human
          devai sense-dep-graph    --repo-root . --human
          devai sense-coverage     --repo-root . --routes-path .devai/state/sensors/inventory_routes/routes-angular.json --human

      - name: Validate stynx invariants against the schema
        working-directory: stynx
        run: devai spec validate-invariants --repo-root . --human
        # Uses devai's canonical validator (schema + ID uniqueness + domain +
        # anchor checks) instead of a hand-rolled ajv script. Its default
        # companion-pattern exclusion (*-allowlist.json, *-data.json) is why
        # RBAC-001-allowlist.json (renamed from the non-matching
        # RBAC-001-allowlist.data.json, closing TASK-0003) is correctly
        # skipped rather than validated as an incomplete invariant. A
        # zero-match glob here is caught by the glob-guards step above
        # (INVARIANTS_DIR, min_matches 10), not re-guarded inline.

      - name: Refresh invariant candidates (informational)
        working-directory: stynx
        run: devai inv-suggest --from-inventory --repo-root . --human

      - name: Validate any module-blueprints in draft
        working-directory: stynx
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in docs/framework/product/draft/blueprints/*.json; do
            echo "::group::validate $f"
            devai blueprint-validate --file "$f" --human
            echo "::endgroup::"
          done

      - name: Upload sensor + candidate evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: devai-evidence-${{ github.run_id }}
          path: |
            stynx/.devai/state/sensors/**
            stynx/.devai/state/sensor-readings/**
            stynx/.devai/state/inv-candidates/**
            stynx/.devai/state/scorecards/**
            stynx/.devai/state/llm-usage.jsonl
            stynx/.devai/state/agent-runs/**
            stynx/.devai/state/skills/**
          if-no-files-found: ignore
          retention-days: 14
