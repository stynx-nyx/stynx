# DEVAI gates for stynx (Phase E of C-4 adoption pilot).
# Runs the seven L0 inventory sensors + spec validation on every PR
# to surface inventory drift, unbound endpoints, unmapped routes, and
# invariant violations BEFORE merge.
#
# devai is consumed as published @devai-nyx/{cli,core,schemas,sensors,utils}
# packages from GitHub Packages (npm-package consumption model, D-118) -- no
# sibling ../devai checkout. Command paths follow the 0.5.0 hierarchical
# CLI (Round 16, D-129; see devai docs/adopters/migrating-to-0.5.0.md).
# @devai-nyx:registry is scoped in .npmrc;
# NODE_AUTH_TOKEN needs read:packages on the devai-nyx org (the ambient
# GITHUB_TOKEN cannot read another org's packages even though
# devai-nyx/devai is public). Stack-adapter packs (examples/redox-pack-*)
# ship inside @devai-nyx/core as of 0.4.0, so pack-tuned sensors resolve
# via node_modules/@devai-nyx/core -- @devai-nyx/core is declared as a
# direct devDependency (not just transitive via cli) specifically so
# pnpm's strict node_modules layout exposes it at that path.

name: devai-gates

on:
  pull_request:
    branches: [main]
    paths:
      - '.devai/**'
      - 'docs/framework/arch/**'
      - 'docs/framework/product/**'
      - 'reference/**'
      - 'packages/**'
      - 'packages-web/**'
      - 'domain/**'
      - '.github/workflows/devai-gates.yml'
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: devai-gates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate-status:
    name: DEVAI gate status
    runs-on: ubuntu-latest
    steps:
      - name: Report DEVAI gate mode
        run: |
          if [ "${{ vars.DEVAI_GATES_ENABLED }}" = "true" ]; then
            echo "::notice::devai-gates enabled"
          else
            echo "::notice::devai-gates skipped: DEVAI_GATES_ENABLED unset"
          fi

  devai-inventory:
    name: DEVAI inventory + invariant gates
    if: ${{ vars.DEVAI_GATES_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout stynx
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 9.15.0

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies (resolves @devai-nyx/* from GitHub Packages)
        run: |
          pnpm install --frozen-lockfile
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.DEVAI_REPO_TOKEN || github.token }}
          # DEVAI_REPO_TOKEN previously only needed contents:read (git clone
          # of the sibling devai checkout); it now also needs read:packages
          # on the devai-nyx org to pull @devai-nyx/* from GitHub Packages.
          # Verify/update the token's scope if this step 401s.

      - name: Verify pack matches stynx
        run: devai adopt pack resolve --repo-root node_modules/@devai-nyx/core --adopter-root . --format human

      - name: devai doctor --adopter (expects 10/10 PASS)
        run: devai doctor --adopter --format human

      - name: devai policy check glob guards (devai D-124; catches a renamed/retired path before it goes silently dead)
        run: devai policy check glob guards --repo-root . --format human

      - name: devai policy check forbidden actions --strict (16/16 canonical entries present)
        run: devai policy check forbidden actions --strict --format human

      - name: Run the six L0 inventory sensors
        run: |
          set -euo pipefail
          devai sense inventory api           --repo-root . --adopter-root . --packs-root node_modules/@devai-nyx/core --pack-tune --format human
          devai sense inventory routes        --repo-root . --adopter-root . --packs-root node_modules/@devai-nyx/core --pack-tune --format human
          devai sense inventory data model    --repo-root . --adopter-root . --packs-root node_modules/@devai-nyx/core --pack-tune --format human
          devai sense inventory data handling --repo-root . --format human
          devai sense inventory rbac          --repo-root . --format human
          devai sense inventory dep graph     --repo-root . --format human

      - name: Run sense inventory coverage (tolerate REVIEW; devai route ids are line-number-derived and legitimately churn on any app.routes.ts edit)
        # devai's `sense inventory coverage` exits 0 (PASS), 1 (REVIEW), or 2 (FAIL/ERROR)
        # -- REVIEW is a deliberately distinct, non-fatal status (see
        # @devai-nyx/utils EXIT_REVIEW=1 vs EXIT_FAIL=2), not an alias for
        # failure. Angular route ids are a content hash over
        # `${file}::${path}::${startLine}` (@devai-nyx/sensors
        # inventory-routes.ts), so a single line added/removed anywhere above
        # a route in app.routes.ts regenerates every route id below it and
        # desyncs every use-case refs.routeIds pointing at the old ones --
        # observed here 2026-07-13, where one shifted line invalidated all 17
        # routes' ids at once. There is no path-based fallback match in
        # inventory-coverage.ts, only exact id equality, so this WILL recur.
        # Structural/redirect-only routes with no component (e.g. the
        # `admin` container and its `redirectTo: 'users'` child) are also
        # expected to sit outside use-case narrative coverage permanently --
        # there's no exemption tag for them today. Flagged upstream to devai
        # (route-id stability + coverage fallback matching); until that
        # lands, hard-failing this step on every incidental line-count change
        # would make the gate flap for reasons unrelated to real coverage
        # regressions, so only exit 2 (FAIL/ERROR) is treated as fatal here.
        run: |
          set +e
          devai sense inventory coverage --repo-root . --routes-path .devai/state/sensors/inventory_routes/routes-angular.json --format human
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "::error::sense-coverage exited FAIL/ERROR (2) -- a real invalid/broken state, not just unresolved use-case links"
            exit 1
          elif [ "$code" -eq 1 ]; then
            echo "::warning::sense-coverage returned REVIEW (exit 1) -- some routes/endpoints remain unmapped or use-case linkage has drifted. Accepted steady-state pending an upstream devai fix to route-id stability; see step comment."
          fi

      - name: Validate stynx invariants against the schema
        run: devai spec validate invariants --repo-root . --format human
        # Uses devai's canonical validator (schema + ID uniqueness + domain +
        # anchor checks) instead of a hand-rolled ajv script. Its default
        # companion-pattern exclusion (*-allowlist.json, *-data.json) is why
        # RBAC-001-allowlist.json (renamed from the non-matching
        # RBAC-001-allowlist.data.json, closing TASK-0003) is correctly
        # skipped rather than validated as an incomplete invariant. A
        # zero-match glob here is caught by the glob-guards step above
        # (INVARIANTS_DIR, min_matches 10), not re-guarded inline.

      - name: Refresh invariant candidates (informational)
        run: devai inventory suggest --from-inventory --repo-root . --format human

      - name: Validate any module-blueprints in draft
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in docs/framework/product/draft/blueprints/*.json; do
            echo "::group::validate $f"
            devai spec blueprint validate --file "$f" --format human
            echo "::endgroup::"
          done

      - name: Upload sensor + candidate evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: devai-evidence-${{ github.run_id }}
          path: |
            .devai/state/sensors/**
            .devai/state/sensor-readings/**
            .devai/state/inv-candidates/**
            .devai/state/scorecards/**
            .devai/state/llm-usage.jsonl
            .devai/state/agent-runs/**
            .devai/state/skills/**
          if-no-files-found: ignore
          retention-days: 14
