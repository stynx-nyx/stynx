name: Evidence

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: evidence-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Standalone policy verification via the single-source gate
  # (ADR-CI-ECONOMY Decision 7); mode verify runs the repo verifier with
  # --mode auto and consumes no outputs.
  verify:
    uses: devai-nyx/devai/.github/workflows/reusable-evidence-gate.yml@main
    with:
      mode: verify
