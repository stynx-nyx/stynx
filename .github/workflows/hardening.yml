name: Hardening

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: k6 scenario to run
        required: false
        default: crud
        type: choice
        options:
          - auth
          - crud
          - upload
          - cascade-delete
          - all
  schedule:
    - cron: '0 4 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'
  K6_ARTIFACT_NAME: k6-results-${{ github.event.inputs.scenario || 'all' }}

permissions:
  contents: read
  actions: read

concurrency:
  group: hardening-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k6:
    name: k6
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Start reference stack
        run: docker compose -f reference/api/docker-compose.yml up -d --build

      - name: Wait for API
        run: |
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/healthz >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f reference/api/docker-compose.yml logs
          exit 1

      - name: Run k6 scenarios
        env:
          STYNX_K6_SCENARIO: ${{ github.event.inputs.scenario || 'all' }}
          STYNX_K6_AUTH_RATE: '10'
          STYNX_K6_CRUD_RATE: '4'
          STYNX_K6_UPLOAD_RATE: '5'
          STYNX_K6_CASCADE_DELETE_RATE: '2'
          STYNX_K6_PREALLOCATED_VUS: '4'
          STYNX_K6_MAX_VUS: '25'
          STYNX_K6_STORAGE_PRESIGN_P99_MS: '500'
        run: |
          set -euo pipefail
          mkdir -p test/perf/k6/results
          export STYNX_K6_BASE_URL=http://127.0.0.1:3000
          export STYNX_K6_S3_PUBLIC_BASE_URL=http://127.0.0.1:4566
          export STYNX_K6_SCENARIO_PAUSE_MS=65000
          node test/perf/k6/run-scenarios.mjs --scenario "${STYNX_K6_SCENARIO}"

      - name: Download previous k6 baseline
        env:
          GH_TOKEN: ${{ github.token }}
          K6_ARTIFACT_NAME: ${{ env.K6_ARTIFACT_NAME }}
        run: |
          mkdir -p test/perf/k6/baseline
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          import zipfile


          class CrossHostRedirectHandler(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  redirect = super().redirect_request(req, fp, code, msg, headers, newurl)
                  if redirect is None:
                      return None
                  original_host = urllib.parse.urlparse(req.full_url).netloc
                  redirect_host = urllib.parse.urlparse(newurl).netloc
                  if original_host != redirect_host:
                      for header in ("Authorization", "Accept"):
                          redirect.headers.pop(header, None)
                          redirect.unredirected_hdrs.pop(header, None)
                  return redirect

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          current_run_id = os.environ.get("GITHUB_RUN_ID")
          runs_endpoint = f"https://api.github.com/repos/{repo}/actions/workflows/hardening.yml/runs?branch=main&per_page=20"
          request = urllib.request.Request(runs_endpoint, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          })
          with urllib.request.urlopen(request) as response:
              payload = json.load(response)

          workflow_runs = [
              run
              for run in payload.get("workflow_runs", [])
              if run.get("status") == "completed" and run.get("conclusion") == "success"
              if str(run.get("id")) != str(current_run_id)
          ]
          if not workflow_runs:
              open("test/perf/k6/baseline/.first-seed-allowed", "w").write("no prior successful hardening.yml runs on main\n")
              raise SystemExit(0)

          target_run = workflow_runs[0]
          artifacts_endpoint = target_run["artifacts_url"]
          artifacts_request = urllib.request.Request(artifacts_endpoint, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          })
          with urllib.request.urlopen(artifacts_request) as response:
              artifacts_payload = json.load(response)

          artifacts = [
              artifact
              for artifact in artifacts_payload.get("artifacts", [])
              if artifact.get("name") == os.environ["K6_ARTIFACT_NAME"] and not artifact.get("expired")
          ]
          if not artifacts:
              raise SystemExit(
                  f"No unexpired {os.environ['K6_ARTIFACT_NAME']} artifact found on prior successful main run {target_run['id']}"
              )

          archive_url = artifacts[0]["archive_download_url"]
          archive_request = urllib.request.Request(archive_url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          })
          archive_path = "test/perf/k6/baseline/baseline.zip"
          artifact_opener = urllib.request.build_opener(CrossHostRedirectHandler)
          with artifact_opener.open(archive_request) as response, open(archive_path, "wb") as handle:
              handle.write(response.read())

          with zipfile.ZipFile(archive_path) as archive:
              archive.extractall("test/perf/k6/baseline")
          open("test/perf/k6/baseline/.baseline-run", "w").write(str(target_run["id"]) + "\n")
          PY

      - name: Compare k6 summaries with prior baseline
        run: |
          set -eu
          found_current=false
          for current in test/perf/k6/results/*.summary.json; do
            if [ ! -f "$current" ]; then
              echo "No current k6 summary files were produced"
              exit 1
            fi
            found_current=true
            name="$(basename "$current")"
            baseline="test/perf/k6/baseline/$name"
            if [ -f "$baseline" ]; then
              node test/perf/k6/check-summary.mjs "$current" "$baseline"
            elif [ -f test/perf/k6/baseline/.first-seed-allowed ]; then
              echo "No previous k6 baseline exists on main; allowing this first seed run for $name"
            else
              echo "Missing required k6 baseline artifact for $name"
              exit 1
            fi
          done
          if [ "$found_current" != "true" ]; then
            echo "No current k6 summary files were produced"
            exit 1
          fi

      - name: Upload k6 artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.K6_ARTIFACT_NAME }}
          path: test/perf/k6/results
          if-no-files-found: error

      - name: Stop reference stack
        if: always()
        run: docker compose -f reference/api/docker-compose.yml down -v

  mutation:
    name: mutation-${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stynx
          POSTGRES_USER: stynx
          POSTGRES_PASSWORD: stynx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stynx -d stynx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      STYNX_TEST_PG_HOST: 127.0.0.1
      STYNX_TEST_PG_PORT: '5432'
      STYNX_TEST_PG_USER: stynx
      STYNX_TEST_PG_PASSWORD: stynx
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: auth
            filter: '@stynx-nyx/auth'
            report_path: packages/auth/reports/mutation
          - package: tenancy
            filter: '@stynx-nyx/tenancy'
            report_path: packages/tenancy/reports/mutation
          - package: data
            filter: '@stynx-nyx/data'
            report_path: packages/data/reports/mutation
          - package: flow
            filter: '@stynx-nyx/flow'
            report_path: packages/flow/reports/mutation
          - package: idempotency
            filter: '@stynx-nyx/idempotency'
            report_path: packages/idempotency/reports/mutation
          - package: ratelimit
            filter: '@stynx-nyx/ratelimit'
            report_path: packages/ratelimit/reports/mutation
          - package: audit
            filter: '@stynx-nyx/audit'
            report_path: packages/audit/reports/mutation
          - package: storage
            filter: '@stynx-nyx/storage'
            report_path: packages/storage/reports/mutation
          - package: privacy
            filter: '@stynx-nyx/privacy'
            report_path: packages/privacy/reports/mutation
          - package: core
            filter: '@stynx-nyx/core'
            report_path: packages/core/reports/mutation
          - package: sessions
            filter: '@stynx-nyx/sessions'
            report_path: packages/sessions/reports/mutation
          - package: backend
            filter: '@stynx-nyx/backend'
            report_path: packages/backend/reports/mutation
          - package: cli
            filter: '@stynx-nyx/cli'
            report_path: packages/cli/reports/mutation
          - package: contracts
            filter: '@stynx-nyx/contracts'
            report_path: packages/contracts/reports/mutation
          - package: health
            filter: '@stynx-nyx/health'
            report_path: packages/health/reports/mutation
          - package: i18n
            filter: '@stynx-nyx/i18n'
            report_path: packages/i18n/reports/mutation
          - package: logging
            filter: '@stynx-nyx/logging'
            report_path: packages/logging/reports/mutation
          - package: testing
            filter: '@stynx-nyx/testing'
            report_path: packages/testing/reports/mutation
          - package: angular
            filter: '@stynx-web/angular'
            report_path: packages-web/angular/reports/mutation
          - package: angular-audit
            filter: '@stynx-web/angular-audit'
            report_path: packages-web/angular-audit/reports/mutation
          - package: angular-auth
            filter: '@stynx-web/angular-auth'
            report_path: packages-web/angular-auth/reports/mutation
          - package: angular-flow
            filter: '@stynx-web/angular-flow'
            report_path: packages-web/angular-flow/reports/mutation
          - package: angular-i18n
            filter: '@stynx-web/angular-i18n'
            report_path: packages-web/angular-i18n/reports/mutation
          - package: angular-iam
            filter: '@stynx-web/angular-iam'
            report_path: packages-web/angular-iam/reports/mutation
          - package: angular-profile
            filter: '@stynx-web/angular-profile'
            report_path: packages-web/angular-profile/reports/mutation
          - package: angular-sessions
            filter: '@stynx-web/angular-sessions'
            report_path: packages-web/angular-sessions/reports/mutation
          - package: angular-storage
            filter: '@stynx-web/angular-storage'
            report_path: packages-web/angular-storage/reports/mutation
          - package: angular-tenancy
            filter: '@stynx-web/angular-tenancy'
            report_path: packages-web/angular-tenancy/reports/mutation
          - package: angular-trash
            filter: '@stynx-web/angular-trash'
            report_path: packages-web/angular-trash/reports/mutation
          - package: angular-ui
            filter: '@stynx-web/angular-ui'
            report_path: packages-web/angular-ui/reports/mutation
          - package: sdk
            filter: '@stynx-web/sdk'
            report_path: packages-web/sdk/reports/mutation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package dependency closure
        run: pnpm --filter "${{ matrix.filter }}..." build

      - name: Run Stryker
        env:
          STRYKER_INCREMENTAL: 'false'
        run: pnpm --filter "${{ matrix.filter }}" stryker

      - name: Upload mutation reports (legacy + canonical)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-report-${{ matrix.package }}
          path: |
            ${{ matrix.report_path }}
            packages/${{ matrix.package }}/.test-results/mutation.json
            packages/${{ matrix.package }}/.test-results/mutation.log
          if-no-files-found: error
