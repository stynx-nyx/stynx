name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to build
        required: true
        default: manual
        type: string
  release:
    types:
      - published

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  containers:
    name: build-sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set image metadata
        id: meta
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ] && [ -n "${RELEASE_TAG:-}" ]; then
            raw_tag="$RELEASE_TAG"
          else
            raw_tag="${INPUT_IMAGE_TAG:-manual}"
          fi

          tag="$(printf '%s' "$raw_tag" | tr -c 'A-Za-z0-9_.-' '-' | sed -E 's/^-+//; s/-+$//; s/-+/-/g' | cut -c1-128)"
          if [ -z "$tag" ]; then
            tag="manual"
          fi

          {
            echo "raw_tag=$raw_tag"
            echo "tag=$tag"
            echo "reference_api=stynx/reference-api:$tag"
            echo "reference_web=stynx/reference-web:$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Build reference-api image
        run: docker build -f apps/reference-api/Dockerfile -t "${{ steps.meta.outputs.reference_api }}" .

      - name: Build reference-web image
        run: docker build -f apps/reference-web/Dockerfile -t "${{ steps.meta.outputs.reference_web }}" .

      - name: Record image metadata
        run: |
          docker image inspect "${{ steps.meta.outputs.reference_api }}" "${{ steps.meta.outputs.reference_web }}" > "release-images-${{ steps.meta.outputs.tag }}.json"

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate release SBOMs
        run: |
          "${{ steps.syft.outputs.cmd }}" "${{ steps.meta.outputs.reference_api }}" -o spdx-json=reference-api-${{ steps.meta.outputs.tag }}.spdx.json
          "${{ steps.syft.outputs.cmd }}" "${{ steps.meta.outputs.reference_web }}" -o spdx-json=reference-web-${{ steps.meta.outputs.tag }}.spdx.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ steps.meta.outputs.tag }}
          path: |
            release-images-${{ steps.meta.outputs.tag }}.json
            reference-api-${{ steps.meta.outputs.tag }}.spdx.json
            reference-web-${{ steps.meta.outputs.tag }}.spdx.json
          if-no-files-found: error
