name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'

jobs:
  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            tools/*/package.json
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Check runtime engines
        run: pnpm check:engines

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint workspace
        run: pnpm lint
      - name: Dead-code gate
        run: pnpm lint:deadcode
      - name: Orphaned-dependency gate
        run: pnpm lint:deps
      - name: Reject unresolved adopt permission sentinels
        run: |
          if rg -n "TODO_PERMISSION" apps packages packages-web tools infra/cdk/bin infra/cdk/lib infra/cdk/test; then
            echo "Unresolved TODO_PERMISSION sentinel found in source surfaces"
            exit 1
          fi

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck workspace
        run: pnpm typecheck

  lint-cycles:
    name: lint:cycles
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Reject circular dependencies
        run: pnpm lint:cycles

  migration-lint:
    name: migration-lint
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            tools/migration-linter/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint SQL migrations
        run: pnpm lint:migrations

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - lint-cycles
      - migration-lint
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm test

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stynx
          POSTGRES_USER: stynx
          POSTGRES_PASSWORD: stynx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stynx -d stynx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://stynx:stynx@localhost:5432/stynx
      STYNX_DATABASE_URL: postgresql://stynx:stynx@localhost:5432/stynx
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply platform migrations for runtime verification
        run: |
          pnpm --filter @stynx/cli build
          node packages/cli/dist/cli/src/main.js migrate up --database-url "${DATABASE_URL}"
      - name: Verify migrated database structure
        run: pnpm db:verify
      - name: Apply database DDL and seeds
        run: bash scripts/db-reset.sh --database-url "${DATABASE_URL}"
      - name: Run RLS smoke check against live database
        run: pnpm check:rls-smoke
      - name: Run integration tests
        run: pnpm test:int

  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: integration-tests
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace
        run: pnpm build

  doctor:
    name: doctor
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run doctor
        run: pnpm doctor

  reference-web-e2e:
    name: reference-web-e2e
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            packages-web/*/package.json
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @stynx/reference-web exec playwright install --with-deps chromium
      - name: Start reference API stack
        run: docker compose -f apps/reference-api/docker-compose.yml up -d --build
      - name: Wait for reference API health gates
        run: |
          set -euo pipefail
          for endpoint in healthz readyz; do
            for i in $(seq 1 120); do
              if curl -sf "http://127.0.0.1:3000/${endpoint}" >/dev/null; then
                break
              fi
              if [ "$i" -eq 120 ]; then
                docker compose -f apps/reference-api/docker-compose.yml ps
                docker compose -f apps/reference-api/docker-compose.yml logs --no-color --timestamps postgres redis localstack reference-api
                exit 1
              fi
              sleep 2
            done
          done
      - name: Run reference web E2E
        env:
          CI: 'true'
        run: pnpm --filter @stynx/reference-web test:e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reference-web-playwright-artifacts
          path: |
            apps/reference-web/test-results
            apps/reference-web/playwright-report
          if-no-files-found: ignore
      - name: Stop reference API stack
        if: always()
        run: docker compose -f apps/reference-api/docker-compose.yml down -v
