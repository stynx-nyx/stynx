name: STYNX CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'
  schedule:
    - cron: '17 5 * * *'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'

jobs:
  evidence-gate:
    name: evidence-gate
    runs-on: ubuntu-latest
    outputs:
      evidence_mode: ${{ steps.verify.outputs.evidence_mode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check local CI evidence mode
        id: verify
        run: node scripts/evidence/verify-local-evidence.mjs --mode gate --github-output "$GITHUB_OUTPUT"
        env:
          LOCAL_EVIDENCE_TRUSTED_ACTORS: ${{ vars.LOCAL_EVIDENCE_TRUSTED_ACTORS }}

  install:
    name: install
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Check runtime engines
        run: pnpm check:engines

  stynx-tier-gate:
    name: stynx-tier-gate
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' && (github.event_name == 'pull_request' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/heads/release/')) }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stynx
          POSTGRES_USER: stynx
          POSTGRES_PASSWORD: stynx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stynx -d stynx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      STYNX_TEST_PG_HOST: 127.0.0.1
      STYNX_TEST_PG_PORT: '5432'
      STYNX_TEST_PG_USER: stynx
      STYNX_TEST_PG_PASSWORD: stynx
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @stynx/pdf exec playwright install --with-deps chromium
      - name: Run fast PR gate
        if: ${{ github.event_name == 'pull_request' }}
        run: pnpm ci:stynx
      - name: Run comprehensive test gate
        if: ${{ github.event_name == 'schedule' || startsWith(github.ref, 'refs/heads/release/') }}
        run: pnpm ci:stynx:full

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs:
      - evidence-gate
      - install
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint STYNX framework workspaces
        run: pnpm lint
      - name: Dead-code gate
        run: pnpm lint:deadcode
      - name: Orphaned-dependency gate
        run: pnpm lint:deps
      - name: Reject unresolved adopt permission sentinels
        run: |
          if rg -n "TODO_PERMISSION" packages packages-web tools infra/cdk/bin infra/cdk/lib infra/cdk/test; then
            echo "Unresolved TODO_PERMISSION sentinel found in source surfaces"
            exit 1
          fi

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs:
      - evidence-gate
      - lint
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck STYNX framework workspaces
        run: pnpm typecheck

  lint-cycles:
    name: lint:cycles
    runs-on: ubuntu-latest
    needs:
      - evidence-gate
      - lint
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Reject circular dependencies
        run: pnpm lint:cycles

  migration-lint:
    name: migration-lint
    runs-on: ubuntu-latest
    needs:
      - evidence-gate
      - lint
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            tools/migration-linter/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint SQL migrations
        run: pnpm lint:migrations

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs:
      - evidence-gate
      - typecheck
      - lint-cycles
      - migration-lint
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stynx
          POSTGRES_USER: stynx
          POSTGRES_PASSWORD: stynx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stynx -d stynx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://stynx:stynx@127.0.0.1:5432/stynx
      STYNX_DATABASE_URL: postgresql://stynx:stynx@127.0.0.1:5432/stynx
      STYNX_TEST_PG_HOST: 127.0.0.1
      STYNX_TEST_PG_PORT: '5432'
      STYNX_TEST_PG_USER: stynx
      STYNX_TEST_PG_PASSWORD: stynx
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @stynx/pdf exec playwright install --with-deps chromium
      - name: Run STYNX unit tests
        run: pnpm test
      - name: Upload canonical test-result artifacts (unit)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit
          path: |
            packages/*/.test-results/**
            packages-web/*/.test-results/**
            tools/*/.test-results/**
            test/*/.test-results/**
            reference/*/.test-results/**
            domain/*/*/.test-results/**
            infra/*/.test-results/**
          if-no-files-found: warn
          retention-days: 14
      - name: Publish JUnit summary (unit)
        if: ${{ always() }}
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/.test-results/unit.junit.xml'
          check_name: unit-tests
          fail_on_failure: false
          require_tests: false

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    needs:
      - evidence-gate
      - unit-tests
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stynx
          POSTGRES_USER: stynx
          POSTGRES_PASSWORD: stynx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stynx -d stynx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://stynx:stynx@127.0.0.1:5432/stynx
      STYNX_DATABASE_URL: postgresql://stynx:stynx@127.0.0.1:5432/stynx
      STYNX_TEST_PG_HOST: 127.0.0.1
      STYNX_TEST_PG_PORT: '5432'
      STYNX_TEST_PG_USER: stynx
      STYNX_TEST_PG_PASSWORD: stynx
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply platform migrations for runtime verification
        run: |
          pnpm --filter @stynx/cli build
          node packages/cli/dist/cli/src/main.js migrate up --database-url "${DATABASE_URL}"
      - name: Verify migrated database structure
        run: pnpm db:verify
      - name: Apply database DDL and seeds
        run: bash scripts/db-reset.sh --database-url "${DATABASE_URL}"
      - name: Run RLS smoke check against live database
        run: pnpm check:rls-smoke
      - name: Run STYNX integration tests
        run: pnpm test:int
      - name: Upload canonical test-result artifacts (integration + smoke)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: |
            packages/*/.test-results/**
            reference/*/.test-results/**
            domain/*/*/.test-results/**
            .test-results/**
          if-no-files-found: warn
          retention-days: 14
      - name: Publish JUnit summary (integration)
        if: ${{ always() }}
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/.test-results/integration.junit.xml'
          check_name: integration-tests
          fail_on_failure: false
          require_tests: false

  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - evidence-gate
      - integration-tests
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build STYNX framework workspaces
        run: pnpm build

  doctor:
    name: doctor
    runs-on: ubuntu-latest
    needs:
      - evidence-gate
      - build
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            docs/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run doctor
        run: pnpm run doctor
