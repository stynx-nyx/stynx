name: STYNX Reference Apps

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.ci/evidence/**'
      - '.github/workflows/reference-apps.yml'
      - '.github/workflows/evidence.yml'
      - 'reference/api/**'
      - 'reference/web/**'
      - 'package.json'
      - 'packages/**'
      - 'packages-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/ci-local/**'
      - 'tools/**'
  push:
    branches:
      - main
    paths:
      - '.ci/evidence/**'
      - '.github/workflows/reference-apps.yml'
      - '.github/workflows/evidence.yml'
      - 'reference/api/**'
      - 'reference/web/**'
      - 'package.json'
      - 'packages/**'
      - 'packages-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/ci-local/**'
      - 'tools/**'

concurrency:
  group: reference-apps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'
  # @devai-nyx/* resolves from GitHub Packages (npm.pkg.github.com), which
  # needs an authenticated read regardless of the source repo's visibility.
  NODE_AUTH_TOKEN: ${{ secrets.DEVAI_REPO_TOKEN || github.token }}

jobs:
  # Single-source evidence gate (ADR-CI-ECONOMY Decision 7).
  evidence-gate:
    uses: devai-nyx/devai/.github/workflows/reusable-evidence-gate.yml@main

  reference-api:
    name: reference-api
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stynx
          POSTGRES_USER: stynx
          POSTGRES_PASSWORD: stynx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stynx -d stynx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://stynx:stynx@127.0.0.1:5432/stynx
      STYNX_DATABASE_URL: postgresql://stynx:stynx@127.0.0.1:5432/stynx
      STYNX_TEST_PG_HOST: 127.0.0.1
      STYNX_TEST_PG_PORT: '5432'
      STYNX_TEST_PG_USER: stynx
      STYNX_TEST_PG_PASSWORD: stynx
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and test reference API
        run: |
          pnpm --filter @stynx-nyx/reference-api... build
          pnpm --filter @stynx-nyx/reference-api test
          pnpm --filter @stynx-nyx/reference-api test:int

  reference-web-e2e:
    name: reference-web-e2e
    runs-on: ubuntu-latest
    needs:
      - evidence-gate
      - reference-api
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @stynx-nyx/reference-web exec playwright install --with-deps chromium
      - name: Start reference API stack
        run: docker compose -f reference/api/docker-compose.yml up -d --build
      - name: Wait for reference API health gates
        run: |
          set -euo pipefail
          for endpoint in healthz readyz; do
            for i in $(seq 1 120); do
              if curl -sf "http://127.0.0.1:3000/${endpoint}" >/dev/null; then
                break
              fi
              if [ "$i" -eq 120 ]; then
                docker compose -f reference/api/docker-compose.yml ps
                docker compose -f reference/api/docker-compose.yml logs --no-color --timestamps postgres redis localstack reference-api
                exit 1
              fi
              sleep 2
            done
          done
      - name: Run reference web E2E
        env:
          CI: 'true'
        run: pnpm --filter @stynx-nyx/reference-web test:e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reference-web-playwright-artifacts
          path: |
            reference/web/test-results
            reference/web/playwright-report
          if-no-files-found: ignore
      - name: Stop reference API stack
        if: always()
        run: docker compose -f reference/api/docker-compose.yml down -v

  container-security:
    name: container-security
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build reference-api image
        # DOCKER_BUILDKIT=1 + --secret keeps NODE_AUTH_TOKEN out of image
        # layers/history; the Dockerfile's RUN --mount=type=secret consumes
        # it only for the pnpm install step that needs @devai-nyx/* auth.
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --secret id=node_auth_token,env=NODE_AUTH_TOKEN \
            -f reference/api/Dockerfile -t stynx/reference-api:${{ github.sha }} .
        env:
          NODE_AUTH_TOKEN: ${{ secrets.DEVAI_REPO_TOKEN || github.token }}

      - name: Build reference-web image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --secret id=node_auth_token,env=NODE_AUTH_TOKEN \
            -f reference/web/Dockerfile -t stynx/reference-web:${{ github.sha }} .
        env:
          NODE_AUTH_TOKEN: ${{ secrets.DEVAI_REPO_TOKEN || github.token }}

      - name: Run Trivy on reference-api
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: stynx/reference-api:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Run Trivy on reference-web
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: stynx/reference-web:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Generate image SBOMs
        run: |
          "${{ steps.syft.outputs.cmd }}" stynx/reference-api:${{ github.sha }} -o spdx-json=sbom-reference-api.spdx.json
          "${{ steps.syft.outputs.cmd }}" stynx/reference-web:${{ github.sha }} -o spdx-json=sbom-reference-web.spdx.json

      - name: Upload image SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reference-app-image-sboms
          path: |
            sbom-reference-api.spdx.json
            sbom-reference-web.spdx.json
          if-no-files-found: error
