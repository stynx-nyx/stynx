name: STYNX Reference Apps

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.ci/evidence/**'
      - '.github/workflows/reference-apps.yml'
      - '.github/workflows/evidence.yml'
      - 'reference/api/**'
      - 'reference/web/**'
      - 'package.json'
      - 'packages/**'
      - 'packages-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/ci-local/**'
      - 'scripts/evidence/**'
      - 'tools/**'
  push:
    branches:
      - main
    paths:
      - '.ci/evidence/**'
      - '.github/workflows/reference-apps.yml'
      - '.github/workflows/evidence.yml'
      - 'reference/api/**'
      - 'reference/web/**'
      - 'package.json'
      - 'packages/**'
      - 'packages-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/ci-local/**'
      - 'scripts/evidence/**'
      - 'tools/**'

concurrency:
  group: reference-apps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'

jobs:
  evidence-gate:
    name: evidence-gate
    runs-on: ubuntu-latest
    outputs:
      evidence_mode: ${{ steps.verify.outputs.evidence_mode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check local CI evidence mode
        id: verify
        run: node scripts/evidence/verify-local-evidence.mjs --mode gate --github-output "$GITHUB_OUTPUT"
        env:
          LOCAL_EVIDENCE_TRUSTED_ACTORS: ${{ vars.LOCAL_EVIDENCE_TRUSTED_ACTORS }}

  reference-api:
    name: reference-api
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stynx
          POSTGRES_USER: stynx
          POSTGRES_PASSWORD: stynx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stynx -d stynx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://stynx:stynx@127.0.0.1:5432/stynx
      STYNX_DATABASE_URL: postgresql://stynx:stynx@127.0.0.1:5432/stynx
      STYNX_TEST_PG_HOST: 127.0.0.1
      STYNX_TEST_PG_PORT: '5432'
      STYNX_TEST_PG_USER: stynx
      STYNX_TEST_PG_PASSWORD: stynx
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and test reference API
        run: |
          pnpm --filter @stynx-nyx/reference-api build
          pnpm --filter @stynx-nyx/reference-api test
          pnpm --filter @stynx-nyx/reference-api test:int

  reference-web-e2e:
    name: reference-web-e2e
    runs-on: ubuntu-latest
    needs:
      - evidence-gate
      - reference-api
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            apps/*/package.json
            packages/*/package.json
            packages-web/*/package.json
            test/*/package.json
            tools/*/package.json
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @stynx-nyx/reference-web exec playwright install --with-deps chromium
      - name: Start reference API stack
        run: docker compose -f reference/api/docker-compose.yml up -d --build
      - name: Wait for reference API health gates
        run: |
          set -euo pipefail
          for endpoint in healthz readyz; do
            for i in $(seq 1 120); do
              if curl -sf "http://127.0.0.1:3000/${endpoint}" >/dev/null; then
                break
              fi
              if [ "$i" -eq 120 ]; then
                docker compose -f reference/api/docker-compose.yml ps
                docker compose -f reference/api/docker-compose.yml logs --no-color --timestamps postgres redis localstack reference-api
                exit 1
              fi
              sleep 2
            done
          done
      - name: Run reference web E2E
        env:
          CI: 'true'
        run: pnpm --filter @stynx-nyx/reference-web test:e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reference-web-playwright-artifacts
          path: |
            reference/web/test-results
            reference/web/playwright-report
          if-no-files-found: ignore
      - name: Stop reference API stack
        if: always()
        run: docker compose -f reference/api/docker-compose.yml down -v

  container-security:
    name: container-security
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build reference-api image
        run: docker build -f reference/api/Dockerfile -t stynx/reference-api:${{ github.sha }} .

      - name: Build reference-web image
        run: docker build -f reference/web/Dockerfile -t stynx/reference-web:${{ github.sha }} .

      - name: Run Trivy on reference-api
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: stynx/reference-api:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Run Trivy on reference-web
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: stynx/reference-web:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Generate image SBOMs
        run: |
          "${{ steps.syft.outputs.cmd }}" stynx/reference-api:${{ github.sha }} -o spdx-json=sbom-reference-api.spdx.json
          "${{ steps.syft.outputs.cmd }}" stynx/reference-web:${{ github.sha }} -o spdx-json=sbom-reference-web.spdx.json

      - name: Upload image SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reference-app-image-sboms
          path: |
            sbom-reference-api.spdx.json
            sbom-reference-web.spdx.json
          if-no-files-found: error
