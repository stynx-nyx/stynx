name: STYNX Release Prep

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.changeset/**'
      - '.ci/evidence/**'
      - '.github/workflows/release-prep.yml'
      - '.github/workflows/evidence.yml'
      - '.semgrepignore'
      - 'docs/**'
      - 'infra/github/**'
      - 'infra/cdk/**'
      - 'package.json'
      - 'packages/**'
      - 'packages-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/generate-release-drafts.mjs'
      - 'scripts/evidence/**'
      - 'scripts/verify-release-policy.mjs'
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - '.ci/evidence/**'
      - '.github/workflows/release-prep.yml'
      - '.github/workflows/evidence.yml'
      - '.semgrepignore'
      - 'docs/**'
      - 'infra/github/**'
      - 'infra/cdk/**'
      - 'package.json'
      - 'packages/**'
      - 'packages-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/generate-release-drafts.mjs'
      - 'scripts/evidence/**'
      - 'scripts/verify-release-policy.mjs'

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'

concurrency:
  group: release-prep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evidence-gate:
    name: evidence-gate
    runs-on: ubuntu-latest
    outputs:
      evidence_mode: ${{ steps.verify.outputs.evidence_mode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check local CI evidence mode
        id: verify
        run: node scripts/evidence/verify-local-evidence.mjs --mode gate --github-output "$GITHUB_OUTPUT"
        env:
          LOCAL_EVIDENCE_TRUSTED_ACTORS: ${{ vars.LOCAL_EVIDENCE_TRUSTED_ACTORS }}

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/default --config p/secrets --severity ERROR --metrics=off --error --sarif --output semgrep.sarif

      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          sarif_file: semgrep.sarif

  package-policy:
    name: package-policy
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify release package policy
        run: node scripts/verify-release-policy.mjs

  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Audit workspace dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high

      - name: Audit CDK dependencies
        run: |
          cd infra/cdk
          npm install --ignore-scripts
          npm audit --audit-level=high

  release-drafts:
    name: release-drafts
    runs-on: ubuntu-latest
    needs: evidence-gate
    if: ${{ needs.evidence-gate.outputs.evidence_mode != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Prepare changeset base branch
        run: |
          current_branch="$(git branch --show-current || true)"
          if [ "$current_branch" != "main" ]; then
            git branch --force main origin/main
          fi

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate changeset status and release drafts
        run: |
          pnpm release:status
          node scripts/generate-release-drafts.mjs

      - name: Upload release draft artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-drafts
          path: |
            .changeset/status.json
            .release/drafts
          if-no-files-found: error
