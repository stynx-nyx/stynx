name: STYNX Release Prep

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.changeset/**'
      - '.github/workflows/release-prep.yml'
      - '.semgrepignore'
      - 'docs/**'
      - 'infra/cdk/**'
      - 'package.json'
      - 'packages/**'
      - 'packages-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/generate-release-drafts.mjs'
      - 'scripts/verify-release-policy.mjs'
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - '.github/workflows/release-prep.yml'
      - '.semgrepignore'
      - 'docs/**'
      - 'infra/cdk/**'
      - 'package.json'
      - 'packages/**'
      - 'packages-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/generate-release-drafts.mjs'
      - 'scripts/verify-release-policy.mjs'

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/default --config p/secrets --severity ERROR --metrics=off --error --sarif --output semgrep.sarif

      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  package-policy:
    name: package-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify release package policy
        run: node scripts/verify-release-policy.mjs

  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Audit workspace dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high

      - name: Audit CDK dependencies
        run: |
          cd infra/cdk
          npm install --ignore-scripts
          npm audit --audit-level=high

  release-drafts:
    name: release-drafts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare changeset base branch
        run: |
          current_branch="$(git branch --show-current || true)"
          if [ "$current_branch" != "main" ]; then
            git branch --force main origin/main
          fi

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate changeset status and release drafts
        run: |
          pnpm release:status
          node scripts/generate-release-drafts.mjs

      - name: Upload release draft artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-drafts
          path: |
            .changeset/status.json
            .release/drafts
          if-no-files-found: error
