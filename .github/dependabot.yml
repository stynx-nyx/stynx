# PAUSED 2026-07-09: all update entries have open-pull-requests-limit: 0 for
# the duration of the alignment cycle. GitHub Actions is billing-locked (CI
# cannot run) and most open Dependabot PRs are perma-red on
# ERR_PNPM_OUTDATED_LOCKFILE, so new PRs and rebase churn are suspended
# without deleting this config. Restore the previous limits (10 for npm
# entries) once CI is back and the lockfile workflow is fixed.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      aws-sdk:
        patterns:
          - '@aws-sdk/*'
      nest:
        patterns:
          - '@nestjs/*'
      angular:
        patterns:
          - '@angular*'
          - '@angular-devkit/*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - 'unplugin-swc'
      dev:
        patterns:
          - '@changesets/*'
          - '@commitlint/*'
          - '@eslint/*'
          - '@types/*'
          - '@typescript-eslint/*'
          - 'eslint'
          - 'globals'
          - 'husky'
          - 'lint-staged'
          - 'prettier'
          - 'turbo'
          - 'typescript'

  - package-ecosystem: npm
    directory: /reference/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      angular:
        patterns:
          - '@angular*'
          - '@angular-devkit/*'
          - 'angular-oauth2-oidc'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      dev:
        patterns:
          - '@types/*'
          - '@typescript-eslint/*'
          - 'cross-env'
          - 'cypress'
          - 'eslint'
          - 'globals'
          - 'ts-*'
          - 'typescript'

  - package-ecosystem: npm
    directory: /reference/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      nest:
        patterns:
          - '@nestjs/*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      dev:
        patterns:
          - '@types/*'
          - 'ts-*'
          - 'typescript'

  - package-ecosystem: npm
    directory: /test/db
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      dev:
        patterns:
          - '@types/*'
          - 'ts-*'
          - 'typescript'

  - package-ecosystem: npm
    directory: /test/packages
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      dev:
        patterns:
          - '@types/*'
          - 'ts-*'
          - 'typescript'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
