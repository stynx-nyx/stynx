name: stynx-ci

on:
  push:
    branches: [main]
  pull_request: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install backend deps
        run: npm ci
        working-directory: backend
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Install backend test deps
        run: npm ci
        working-directory: test/backend
      - name: Install frontend test deps
        run: npm ci
        working-directory: test/frontend
      - name: Lint backend
        run: npm run lint
        working-directory: backend
      - name: Test backend
        run: npm test
        working-directory: backend
      - name: Test frontend
        run: npm run test:unit
        working-directory: frontend
      - name: Cypress smoke (headless)
        run: npm run test:e2e
        working-directory: frontend
